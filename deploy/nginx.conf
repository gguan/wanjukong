# overrealm.shop — wanjukong
# 放到服务器 /etc/nginx/sites-available/overrealm.shop
# ln -s /etc/nginx/sites-available/overrealm.shop /etc/nginx/sites-enabled/

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name overrealm.shop www.overrealm.shop;
    return 301 https://overrealm.shop$request_uri;
}

# 主站 (web 前台 + API)
server {
    listen 443 ssl http2;
    server_name overrealm.shop;

    ssl_certificate     /etc/letsencrypt/live/overrealm.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/overrealm.shop/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 20M;

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Web 前台
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Admin 后台 (admin.overrealm.shop)
server {
    listen 443 ssl http2;
    server_name admin.overrealm.shop;

    ssl_certificate     /etc/letsencrypt/live/overrealm.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/overrealm.shop/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
