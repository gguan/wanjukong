services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wanjukong
      POSTGRES_USER: wanjukong
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wanjukong"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/gguan/wanjukong-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://wanjukong:${POSTGRES_PASSWORD}@postgres:5432/wanjukong
      SESSION_SECRET: ${SESSION_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      TENCENT_COS_SECRET_ID: ${TENCENT_COS_SECRET_ID}
      TENCENT_COS_SECRET_KEY: ${TENCENT_COS_SECRET_KEY}
      TENCENT_COS_BUCKET: ${TENCENT_COS_BUCKET}
      TENCENT_COS_REGION: ${TENCENT_COS_REGION}
      TENCENT_COS_PUBLIC_BASE_URL: ${TENCENT_COS_PUBLIC_BASE_URL}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      PAYPAL_BASE_URL: ${PAYPAL_BASE_URL}

  web:
    image: ghcr.io/gguan/wanjukong-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on: [api]
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: ${SITE_URL}
      NUXT_PUBLIC_PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}

  admin:
    image: ghcr.io/gguan/wanjukong-admin:latest
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    depends_on: [api]
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      NUXT_PUBLIC_API_BASE_URL: ${SITE_URL}

volumes:
  pgdata:
